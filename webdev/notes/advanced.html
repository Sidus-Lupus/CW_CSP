<!DOCTYPE html>
<html lang = "en">
    <head>
        <title>Notes on Advanced HTML</title>
        <meta charset="UTF-8"/>
        <!--Embeded style sheets are good practice. They go inside the head tag.-->
        <style>
            *{
                background-color: #030391;
                color: rgb(255, 166, 0);
            }
            p{
                background-color: bisque;
                text-align: center;
            }
            #ordered{
                color:rgba(100, 148, 237, 0.753);
            }
            .section-2{
                font-family: 'Times New Roman', Times, serif;
                border: 3px inset rgb(0, 255, 200);
            }
            h1{
                font-size: 2em;
            }
            img{
                width: 50%;
            }
        </style>
    </head>
    <body>
        <h1>Advanced HTML</h1>
        <!-- inline style. Considered BAD syntax-->
        <div>
            <p>This is in a div</p>
        </div>
        <div id ="ordered"; class="seciton-2">
        <p>This is the way we make an ordered (numbered) list</p>
        <ol>
            <li>Red Wolves</li>
            <li>Gray Wolves</li>
            <li>Timber Wolves</li>
        </ol>
        </div>
        <div id="unordered">
        <p>This is the way we make an unordered (bulleted) list</p>
        <ul style="list-style-type: circle">
            <li>Tails</li>
            <li>Fur</li>
            <li>Muzzles</li>
         </ul>
         </div>
         <div id="linked objects">
         <a href="https://en.wikipedia.org/wiki/Wolf" target="_blank">Wolves (Wikipedia)</a>
         <img src="https://rewilding.org/wp-content/uploads/2025/09/9V3A4389-2-copySQ.jpg" alt="Red Wolf"/>
         </div>
    </body>
</html>
