<!DOCTYPE html>
<html lang = "en">
    <head>
        <title>Notes on Advanced HTML</title>
        <meta charset="UTF-8"/>
        <!--Embeded style sheets are good practice. They go inside the head tag.-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Limelight&display=swap" rel="stylesheet">
        <style>
            body{
                background-color: #030391;
                color: rgb(255, 166, 0);
                font-family: limelight, cursive, fantasy;
                margin: 20px;
            }
            p{
                text-align: center;
                padding: 10px;
            }
            #ordered{ 
                color:rgba(100, 148, 237, 0.753);
                list-style: circle;
            }
            .section{
                font-family: Arial, Helvetica, sans-serif;
                border: 5px inset rgb(0, 255, 200);
            }
            h1{ font-size: 2em;}
            img{ 
                width: 50%;
            
            }
            #bold{ font-weight: bolder;}
            .special{font-variant: small-caps;}
            .box-wrapper{
                display: block;
                margin: auto;
                width: 25%}
            #box{ background-color: green;}
            .list-wrapper{ 
                display: grid;
                grid-template-columns: 50% 50%;
            }
            .image-wrapper{
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
            }
        </style>
    </head>
    <body>
        <h1>Advanced HTML</h1>
        <!-- inline style. Considered BAD syntax-->
        <div class="list-wrapper">
        <div class="box-wrapper">
        <div id="box">
            <p>This is in a <span id="bold"> div</span></p>
        </div>
        </div>
        <div id ="ordered"; class="seciton">
        <p>This is the way we make an ordered (numbered) list</p>
        <ol>
            <li>Red Wolves</li>
            <li>Gray Wolves</li>
            <li>Timber Wolves</li>
        </ol>
        </div>
        <div id="unordered">
        <p>This is the way we make an unordered <span class="special">(Bulleted)</span> list</p>
        <ul>
            <li>Tails</li>
            <li>Fur</li>
            <li>Muzzles</li>
         </ul>
         </div>
         </div>
         <div class="image-wrapper">
            <img src="https://rewilding.org/wp-content/uploads/2025/09/9V3A4389-2-copySQ.jpg" alt="Red Wolf"/>
         <img src="https://rewilding.org/wp-content/uploads/2025/09/9V3A4389-2-copySQ.jpg" alt="Red Wolf"/>
         <img src="https://rewilding.org/wp-content/uploads/2025/09/9V3A4389-2-copySQ.jpg" alt="Red Wolf"/>
         </div>
         <a href="https://en.wikipedia.org/wiki/Wolf" target="_blank">Wolves (Wikipedia)</a>
    </body>
</html>
