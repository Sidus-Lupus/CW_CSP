<!DOCTYPE html>
<html lang="en">
    <head>
        <title>CSS Styling</title>
        <meta charset="UTF-8">
        <style>
            #Complimentary {height: 100px; width: 100px; background-color: #0044DB; border: 5px inset #DC9A01; color: #DC9A01;}
            #Analogous {height: 100px; width: 100px; background-color: #9600EB; border: 5px inset #E300EB; color: #EB006C;}
            #Triadic {height: 100px; width: 100px; background-color: #00EBC6; border: 5px inset #EA00EB; color: #EBB701}
        </style>
    </head>
    <body>
        <div id="Complimentary">
            <p>Complimentary</p>
        </div>
        <div id="Analogous">
            <p>Analgous</p>
        </div>
        <div id="Triadic">
            <p>Triadic</p>
        </div>
    </body>
</html>
